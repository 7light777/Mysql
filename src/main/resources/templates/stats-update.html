<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更新比赛数据 - 篮球数据管理系统</title>
    <link rel="stylesheet" th:href="@{/css/app.css(v=20260606v2)}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar(${activeMenu})}"></div>
    <main class="main">
        <div th:replace="~{fragments/header :: header(${pageTitle})}"></div>
        <section class="content">
            <div class="notice">本页面通过存储过程 sp_update_player_game_stats 同步更新 Game 比赛比分和 PlayerGameStats 球员比赛表现。</div>
            <div class="workflow">
                <span>1 选择比赛</span>
                <span>2 加载本场球员</span>
                <span>3 查看当前数据</span>
                <span>4 调用存储过程更新</span>
            </div>
            <div class="grid-2 wide-left">
                <section class="card">
                    <div class="card-header"><h2>比赛技术统计维护</h2></div>
                    <div id="statsUpdateMessage" class="message hidden"></div>
                    <form id="statsUpdateForm" class="form-grid stats-form">
                        <label class="full">比赛
                            <select name="gameId" id="statsGameSelect" required>
                                <option value="">请选择比赛</option>
                                <option th:each="game : ${games}" th:value="${game.gameId}"
                                        th:text="${game.gameId + ' - ' + game.gameDate + ' - ' + game.homeTeamDisplayName + ' vs ' + game.awayTeamDisplayName + ' - ' + game.homeScore + ':' + game.awayScore}">
                                    42400407 - 2025-06-22 - 雷霆 vs 步行者 - 103:91
                                </option>
                            </select>
                        </label>
                        <label class="full">本场球员
                            <select name="playerId" id="statsPlayerSelect" required disabled>
                                <option value="">请先选择比赛</option>
                            </select>
                        </label>
                        <label>得分<input type="number" name="points" value="0" required></label>
                        <label>篮板<input type="number" name="rebounds" value="0" required></label>
                        <label>助攻<input type="number" name="assists" value="0" required></label>
                        <label>抢断<input type="number" name="steals" value="0" required></label>
                        <label>盖帽<input type="number" name="blocks" value="0" required></label>
                        <div class="form-actions full">
                            <button class="btn btn-primary" type="submit">更新数据</button>
                            <button class="btn btn-secondary" type="reset">重置</button>
                        </div>
                    </form>
                </section>
                <section class="card">
                    <div class="card-header"><h2>当前数据</h2></div>
                    <div id="currentStatsCard" class="current-card">
                        <p>选择比赛后仅显示该比赛相关球员，选择球员后加载当前技术统计。</p>
                    </div>
                </section>
            </div>
        </section>
    </main>
</div>
<script th:src="@{/js/app.js(v=20260606v5)}"></script>
</body>
</html>
